# Nginx reverse proxy with load balancing

http {

    upstream backend {
        server 192.168.247.128;
        server 192.168.247.129;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
