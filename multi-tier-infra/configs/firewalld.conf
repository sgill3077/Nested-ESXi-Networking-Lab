###############################################################################
# Router VM — Firewalld Configuration
# Fedora 40+ (nftables backend)
# VLAN10: 192.168.10.0/24  → ens38.10
# VLAN20: 192.168.20.0/24  → ens38.20
# WAN:    192.168.254.131  → ens37
###############################################################################

# Assign WAN interface to FedoraServer zone
firewall-cmd --zone=FedoraServer --add-interface=ens37 --permanent

# Assign trunk interface to FedoraServer zone
firewall-cmd --zone=FedoraServer --add-interface=ens38 --permanent

###############################################################################
# NAT (Masquerading)
###############################################################################
firewall-cmd --zone=FedoraServer --add-masquerade --permanent

###############################################################################
# Allow Router Services (DNS + HTTP)
###############################################################################
firewall-cmd --zone=FedoraServer --add-service=dns --permanent
firewall-cmd --zone=FedoraServer --add-service=http --permanent

###############################################################################
# VLAN Isolation (nftables direct rules)
###############################################################################
# Block VLAN10 → VLAN20
firewall-cmd --permanent --direct --add-rule ipv4 filter FORWARD 0 \
    -s 192.168.10.0/24 -d 192.168.20.0/24 -j DROP

# Block VLAN20 → VLAN10
firewall-cmd --permanent --direct --add-rule ipv4 filter FORWARD 0 \
    -s 192.168.20.0/24 -d 192.168.10.0/24 -j DROP

###############################################################################
# Reload Firewalld
###############################################################################
firewall-cmd --reload
